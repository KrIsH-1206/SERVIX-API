spring.application.name=servix-api

# ── Database ──────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/servix_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:changeme}

# ── Set schema search path (matches CREATE SCHEMA sevak in sql/sevak_ddl.sql) ──
spring.datasource.hikari.connection-init-sql=SET search_path = sevak

# ── Swagger / OpenAPI ─────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
